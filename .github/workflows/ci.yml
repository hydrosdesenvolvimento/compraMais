name: CI

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------- #
  # Lint + testes dos dois servicos (matriz)                                 #
  # ----------------------------------------------------------------------- #
  test:
    name: Lint, Typecheck & Test in container (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Regra do projeto: toda a suite roda DENTRO do container (nunca no host).
      # O servico `${service}-test` (profile `test`) executa lint + typecheck + test;
      # o codigo de saida do container propaga para o step → falha o CI se algo quebrar.
      - name: Lint, typecheck & test in container
        run: docker compose --profile test run --rm --build ${{ matrix.service }}-test

  # ----------------------------------------------------------------------- #
  # Build + push das imagens para o GHCR                                     #
  # Roda apos os testes; publica em push para branch ou tag (nao em PR).     #
  # ----------------------------------------------------------------------- #
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # face-service e referenciado pelo stack de prod (deploy/compramais-stack.yml);
        # publicar aqui garante que a imagem exista no GHCR. E build pesado (modelos de
        # ML na build), mas o cache gha (mode=max) reaproveita as camadas entre execucoes.
        service: [backend, frontend, face-service]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache por serviço (scope) para o build pesado do face-service nao
          # invalidar o cache do backend/frontend e vice-versa.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ----------------------------------------------------------------------- #
  # Deploy (opcional): dispara o redeploy do stack no Portainer via webhook. #
  # Só roda em push no branch default (main) e apenas se o secret existir —  #
  # sem PORTAINER_WEBHOOK_URL configurado, faz no-op (não falha o CI).       #
  # O Portainer re-puxa as imagens do GHCR e aplica o rolling update.        #
  # ----------------------------------------------------------------------- #
  deploy:
    name: Deploy (Portainer webhook)
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Dispara redeploy do stack no Portainer
        env:
          HOOK: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "PORTAINER_WEBHOOK_URL não configurado — pulando o redeploy automático."
            exit 0
          fi
          echo "Disparando webhook de redeploy do Portainer…"
          curl -fsSL -X POST "$HOOK"
          echo "Webhook disparado."
