name: CI

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------------- #
  # Lint + testes dos dois servicos (matriz)                                 #
  # ----------------------------------------------------------------------- #
  test:
    name: Lint, Typecheck & Test in container (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Regra do projeto: toda a suite roda DENTRO do container (nunca no host).
      # O servico `${service}-test` (profile `test`) executa lint + typecheck + test;
      # o codigo de saida do container propaga para o step → falha o CI se algo quebrar.
      - name: Lint, typecheck & test in container
        run: docker compose --profile test run --rm --build ${{ matrix.service }}-test

  # ----------------------------------------------------------------------- #
  # Build + push das imagens para o GHCR                                     #
  # Roda apos os testes; publica em push para branch ou tag (nao em PR).     #
  # ----------------------------------------------------------------------- #
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
