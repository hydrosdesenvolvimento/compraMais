# docker-compose.yml do compraMais — DEV/TEST + referencia de prod (PRJ-DEC-05).
#
# Profiles:
#   - dev  : build local, bind mount e hot reload (docker compose --profile dev up)
#   - test : suite no container (docker compose --profile test run --rm <svc>-test)
#   - prod : *referencia* dos servicos de producao (imagem do GHCR + bloco deploy:).
#
# PRODUCAO (Portainer/Swarm) usa o STACK DEDICADO, NAO este arquivo:
#   -> deploy/compramais-stack.yml  (ver deploy/README.md)
#   Motivo: `docker stack deploy` e o Portainer IGNORAM `profiles:`, entao apontar
#   este compose ao Swarm traria os servicos de dev/test para a stack de prod.
#   Os servicos `*-prod` aqui permanecem como referencia; mantenha-os em sincronia
#   com deploy/compramais-stack.yml ao mudar env/imagens.
#
# IMPORTANTE sobre `deploy:`:
#   O bloco `deploy:` (replicas, update_config, restart_policy, secrets) e
#   IGNORADO por `docker compose up` e lido APENAS por `docker stack deploy` (Swarm).
#
# Segredos (PRJ-DEC-07):
#   - DEV : valores sensiveis vem do arquivo .env local (NAO versionado).
#   - PROD: senha do banco via Docker secret (db_password) exposta como
#           POSTGRES_PASSWORD_FILE=/run/secrets/db_password. Nunca em texto.

x-db-env: &db-env
  POSTGRES_DB: ${POSTGRES_DB:-compramais}
  POSTGRES_USER: ${POSTGRES_USER:-compramais}

services:
  # ----------------------------------------------------------------------- #
  # Banco PostgreSQL + PostGIS (baseline do DBA: PRJ-DEC-08)                 #
  # Usado por ambos os profiles (dev e prod).                               #
  # ----------------------------------------------------------------------- #
  db:
    image: postgis/postgis:16-3.4
    profiles: ["dev", "prod"]
    environment:
      <<: *db-env
      # DEV: senha vem do .env. PROD: usar *_FILE (ver bloco prod / secrets).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compramais} -d ${POSTGRES_DB:-compramais}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - compramais
    deploy:
      # Lido por `docker stack deploy` (Swarm). Banco e stateful: 1 replica.
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    # Em PROD (Swarm), substituir POSTGRES_PASSWORD por *_FILE via secret:
    # environment:
    #   <<: *db-env
    #   POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    # secrets:
    #   - db_password

  # ----------------------------------------------------------------------- #
  # Backend Fastify (DEV): build local + bind mount + hot reload            #
  # ----------------------------------------------------------------------- #
  backend:
    profiles: ["dev"]
    build:
      context: ./backend
      target: build
    # Reconcilia node_modules (volume nomeado) com o package.json a cada subida — evita erro quando
    # novas deps entram sem recriar o volume (ex.: tsx, swagger). Rápido quando já está atualizado.
    command: sh -c "npm ci --no-audit --no-fund && exec npm run dev"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-compramais}
      POSTGRES_USER: ${POSTGRES_USER:-compramais}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      # CNPJ/CEP via BrasilAPI (sem chave); 'mock' para dev offline.
      RECEITA_PROVIDER: ${RECEITA_PROVIDER:-brasilapi}
      # Reconhecimento facial (UC007). 'mock' em dev (não exige o container pesado); 'insightface'
      # aponta para o serviço `face`. Limiar de cosseno sobreponível (calibração).
      FACE_PROVIDER: ${FACE_PROVIDER:-mock}
      FACE_SERVICE_URL: ${FACE_SERVICE_URL:-http://face:8000}
      FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD:-0.35}
      # Config de dominio documentada (AD-12 / FR-003); defaults preservam o comportamento atual.
      INADIMPLENCIA_POLICY: ${INADIMPLENCIA_POLICY:-fail-open}
      SEI_MALOTE_LIMITE_MB: ${SEI_MALOTE_LIMITE_MB:-10}
      # Integracao SEI (Epico 6). DEV: 'mock' por padrao (sem SEI); a senha vem do .env quando 'web'.
      SEI_PROVIDER: ${SEI_PROVIDER:-mock}
      SEI_BASE_URL: ${SEI_BASE_URL:-}
      SEI_USUARIO: ${SEI_USUARIO:-}
      SEI_SENHA: ${SEI_SENHA:-}
      SEI_SEL_ORGAO: ${SEI_SEL_ORGAO:-}
      SEI_ID_TIPO_PROCEDIMENTO: ${SEI_ID_TIPO_PROCEDIMENTO:-}
      # Autenticacao (FR-015 / AD-20). Em DEV o JWT_SECRET vem do .env; em prod via Docker secret.
      JWT_SECRET: ${JWT_SECRET:-dev-secret-inseguro-trocar-em-producao}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-3600}
      # Cifra de PII em repouso (AD-19). Vazio em DEV = chave de desenvolvimento; em prod e secret.
      PII_ENCRYPTION_KEY: ${PII_ENCRYPTION_KEY:-}
      # Google OAuth (vazio = login social desativado; preencha no .env para habilitar).
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3000/auth/google/callback}
      AUTH_FRONTEND_REDIRECT: ${AUTH_FRONTEND_REDIRECT:-http://localhost:5173/#/cadastro}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - compramais

  # ----------------------------------------------------------------------- #
  # Frontend Vite (DEV): build local + bind mount + hot reload (HMR)        #
  # ----------------------------------------------------------------------- #
  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
      target: build
    # Reconcilia node_modules (volume nomeado) com o package.json a cada subida — evita erro quando
    # novas deps entram sem recriar o volume (ex.: @tanstack/*). Rápido quando já está atualizado.
    command: sh -c "npm ci --no-audit --no-fund && exec npm run dev"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    networks:
      - compramais

  # ----------------------------------------------------------------------- #
  # Reconhecimento facial (DEV): serviço Python isolado (UC007 — prova de   #
  # vida). Fronteira de ML fora do backend TS (Ports & Adapters). Modelos    #
  # SCRFD+ArcFace embutidos na build → runtime offline. Só usado quando      #
  # FACE_PROVIDER=insightface no backend; senão o backend usa o mock.        #
  # ----------------------------------------------------------------------- #
  face:
    profiles: ["dev"]
    build:
      context: ./face-service
    environment:
      FACE_MIN_QUALITY: ${FACE_MIN_QUALITY:-0.5}
    networks:
      - compramais

  # ----------------------------------------------------------------------- #
  # Testes NO CONTAINER (profile `test`) — regra do projeto: toda suite de   #
  # testes roda dentro do container, nunca no host.                          #
  #   docker compose --profile test run --rm backend-test                    #
  #   docker compose --profile test run --rm frontend-test                   #
  # Reutiliza o stage `build` (toolchain + devDependencies) com bind mount   #
  # do codigo e volume de node_modules; executa lint + typecheck + test.     #
  # ----------------------------------------------------------------------- #
  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
      target: build
    command: sh -c "npm ci --no-audit --no-fund && npm run lint && npm run typecheck && npm test"
    environment:
      NODE_ENV: test
      CI: "true"
      # Testes offline/deterministicos: consulta Receita/CEP via mock (sem rede).
      RECEITA_PROVIDER: mock
    volumes:
      - ./backend:/app
      - backend_test_node_modules:/app/node_modules
    networks:
      - compramais

  frontend-test:
    profiles: ["test"]
    build:
      context: ./frontend
      target: build
    command: sh -c "npm ci --no-audit --no-fund && npm run lint && npm run typecheck && npm test"
    environment:
      NODE_ENV: test
      CI: "true"
    volumes:
      - ./frontend:/app
      - frontend_test_node_modules:/app/node_modules
    networks:
      - compramais

  # ----------------------------------------------------------------------- #
  # Backend Fastify (PROD): imagem do GHCR + deploy Swarm                   #
  # Sem build em producao (PRJ-DEC-06): apenas pull da imagem publicada.    #
  # ----------------------------------------------------------------------- #
  backend-prod:
    profiles: ["prod"]
    image: ghcr.io/${GHCR_REPOSITORY:-OWNER/REPO}/backend:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-compramais}
      POSTGRES_USER: ${POSTGRES_USER:-compramais}
      # PROD: senha via Docker secret (nunca em texto / nunca versionada).
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      CORS_ORIGIN: ${CORS_ORIGIN:-https://compramais.example}
      RECEITA_PROVIDER: ${RECEITA_PROVIDER:-brasilapi}
      # Reconhecimento facial (UC007): em prod usa o serviço Python real por padrão.
      FACE_PROVIDER: ${FACE_PROVIDER:-insightface}
      FACE_SERVICE_URL: ${FACE_SERVICE_URL:-http://face-prod:8000}
      FACE_MATCH_THRESHOLD: ${FACE_MATCH_THRESHOLD:-0.35}
      # Config de dominio documentada (AD-12 / FR-003); defaults preservam o comportamento atual.
      INADIMPLENCIA_POLICY: ${INADIMPLENCIA_POLICY:-fail-open}
      SEI_MALOTE_LIMITE_MB: ${SEI_MALOTE_LIMITE_MB:-10}
      # Integracao SEI (Epico 6). Default 'mock' (seguro); mude para 'web' quando a TI provisionar as
      # credenciais/URL/orgao/tipo. Ao habilitar 'web', criar o secret `sei_senha` e apontar
      # SEI_SENHA_FILE=/run/secrets/sei_senha (e referenciar o secret na lista `secrets:` do servico).
      # Vazio por padrao para NAO exigir o secret quando SEI_PROVIDER=mock.
      SEI_PROVIDER: ${SEI_PROVIDER:-mock}
      SEI_BASE_URL: ${SEI_BASE_URL:-}
      SEI_USUARIO: ${SEI_USUARIO:-}
      SEI_SENHA_FILE: ${SEI_SENHA_FILE:-}
      SEI_SEL_ORGAO: ${SEI_SEL_ORGAO:-}
      SEI_ID_TIPO_PROCEDIMENTO: ${SEI_ID_TIPO_PROCEDIMENTO:-}
      # Autenticacao: segredo do JWT via Docker secret (nunca em texto). TTL e Google por env.
      # OBRIGATORIO em prod (AD-20/AD-29): sem ele o backend RECUSA subir. O token e a autorizacao —
      # assinar com o segredo de dev (versionado) deixaria qualquer um forjar um administrador.
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      # Cifra de PII em repouso, AES-256-GCM (AD-19). 32 bytes em base64 ou hex.
      # OBRIGATORIO em prod: sem ela o backend RECUSA subir, em vez de cifrar com chave publica.
      # Gerar: openssl rand -base64 32
      PII_ENCRYPTION_KEY_FILE: /run/secrets/pii_encryption_key
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-3600}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Em prod, prefira injetar GOOGLE_CLIENT_SECRET pelo gestor de segredos (Portainer), nao versionado.
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://compramais.example/auth/google/callback}
      AUTH_FRONTEND_REDIRECT: ${AUTH_FRONTEND_REDIRECT:-https://compramais.example/#/cadastro}
    secrets:
      - db_password
      - jwt_secret
      - pii_encryption_key
      # sei_senha: adicionar aqui apenas ao habilitar SEI_PROVIDER=web (ver bloco `secrets:` no fim).
    networks:
      - compramais
    deploy:
      # Lido por `docker stack deploy`. Servico stateless: replicas + rolling update.
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ----------------------------------------------------------------------- #
  # Frontend nginx (PROD): imagem do GHCR + deploy Swarm                    #
  # ----------------------------------------------------------------------- #
  frontend-prod:
    profiles: ["prod"]
    image: ghcr.io/${GHCR_REPOSITORY:-OWNER/REPO}/frontend:${IMAGE_TAG:-latest}
    ports:
      - "${FRONTEND_PUBLIC_PORT:-80}:8080"
    depends_on:
      - backend-prod
    networks:
      - compramais
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ----------------------------------------------------------------------- #
  # Reconhecimento facial (PROD): imagem do GHCR + deploy Swarm             #
  # ----------------------------------------------------------------------- #
  face-prod:
    profiles: ["prod"]
    image: ghcr.io/${GHCR_REPOSITORY:-OWNER/REPO}/face-service:${IMAGE_TAG:-latest}
    environment:
      FACE_MIN_QUALITY: ${FACE_MIN_QUALITY:-0.5}
    networks:
      - compramais
    deploy:
      # Stateless (só inferência): replicas + rolling update, como o backend.
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        max_attempts: 3

volumes:
  db_data:
  backend_node_modules:
  frontend_node_modules:
  backend_test_node_modules:
  frontend_test_node_modules:

networks:
  compramais:
    # Driver omitido de proposito: `docker compose up` (dev) cria como bridge;
    # `docker stack deploy` (Swarm/prod) cria como overlay automaticamente.
    # Definir driver fixo quebraria um dos dois ambientes.
    attachable: true

# Docker secrets (lidos por `docker stack deploy` em PROD).
# Em dev, NAO use secrets: a senha vem do .env.
secrets:
  db_password:
    # Em producao, criar previamente:
    #   echo "<senha-forte>" | docker secret create db_password -
    # ou referenciar um arquivo externo gerenciado pelo Portainer.
    external: true
  jwt_secret:
    # Segredo de assinatura do JWT (HS256). Criar previamente em prod:
    #   openssl rand -base64 48 | docker secret create jwt_secret -
    # Sem ele o backend nao sobe (AD-20/AD-29).
    external: true
  pii_encryption_key:
    # Chave da cifra de PII em repouso (AES-256-GCM, AD-19). EXATAMENTE 32 bytes, base64 ou hex:
    #   openssl rand -base64 32 | docker secret create pii_encryption_key -
    # Sem ela o backend nao sobe. ATENCAO: perder/rotacionar esta chave torna os documentos ja
    # gravados indecifraveis — nao ha reencriptacao automatica. Guarde-a com o mesmo cuidado do backup.
    external: true
  sei_senha:
    # Senha do usuario do SEI (integracao — Epico 6). So necessaria quando SEI_PROVIDER=web:
    #   printf '<senha-do-sei>' | docker secret create sei_senha -
    # Com SEI_PROVIDER=mock (padrao) a integracao nao lê o secret.
    external: true
