server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressao basica de assets estaticos.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache agressivo para assets versionados pelo Vite (hash no nome).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy dos prefixos de API ao backend (mesma rede do Compose/Swarm).
    # A SPA usa hash routing (#/...), entao estes caminhos so chegam via fetch — sem colisao
    # com as rotas de navegacao. `proxy_pass` sem URI preserva o caminho original (sem rewrite).
    # Manter a lista em sincronia com o proxy do vite.config.ts.
    location ~ ^/(fornecedores|editais|documentos|contestacoes-cnae|auditoria|admin|gestao|titular|transparencia|auth|bloqueios|malotes|metrics|health)(/|$) {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: qualquer rota nao-arquivo cai no index.html (hash routing resolve no cliente).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
