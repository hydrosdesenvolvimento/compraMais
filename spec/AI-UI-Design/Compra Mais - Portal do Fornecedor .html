document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

4F8; /* dividers */\n  --branco:    #FFFFFF;\n\n  /* ---- Status — functional only ---- */\n  --sucesso: #1E7A46;\n  --sucesso-bg: #E6F2EB;\n  --atencao: #B5701A;\n  --atencao-bg: #FBEACB;\n  --erro: #C0362C;\n  --erro-bg: #FBE7E5;\n  --erro-700: #9E2C24;\n  --info: #14467F;\n  --info-bg: #DCE9F8;\n\n  /* ============================================================\n     SEMANTIC ALIASES — prefer these in components\n     ============================================================ */\n\n  /* Page / surfaces */\n  --bg-page: #F6F8FB;\n  --surface-card: var(--branco);\n  --surface-tint: var(--azul-50);\n  --surface-invert: var(--azul-900);\n\n  /* Text */\n  --text-strong: var(--azul-900);\n  --text-heading: var(--azul-800);\n  --text-title: var(--cinza-900);\n  --text-body: var(--cinza-700);\n  --text-muted: var(--cinza-400);\n  --text-on-invert: var(--branco);\n  --text-on-invert-muted: var(--azul-300);\n  --text-link: var(--azul-700);\n  --text-accent: var(--ambar-500);\n\n  /* Brand / action */\n  --brand: var(--azul-700);\n  --brand-hover: var(--azul-800);\n  --brand-active: var(--azul-900);\n  --accent: var(--ambar-300);\n  --accent-hover: var(--ambar-400);\n  --accent-text: var(--azul-900);\n\n  /* Borders / lines */\n  --border: var(--cinza-200);\n  --border-strong: var(--cinza-300);\n  --divider: var(--cinza-100);\n\n  /* Focus */\n  --focus-ring: var(--ambar-300);\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   TYPOGRAPHY — Prefeitura de Rio Branco\n   Libre Franklin: titles — firm and civic.\n   IBM Plex Sans: body & interface — high legibility.\n   ============================================================ */\n\n:root {\n  /* Families */\n  --font-display: \"Libre Franklin\", system-ui, -apple-system, sans-serif;\n  --font-body: \"IBM Plex Sans\", system-ui, -apple-system, sans-serif;\n  /* \"Fonte legível\" accessibility alternative */\n  --font-readable: \"Atkinson Hyperlegible\", \"IBM Plex Sans\", system-ui, sans-serif;\n\n  /* Weights */\n  --fw-regular: 400; /* @kind other */\n  --fw-medium: 500; /* @kind other */\n  --fw-semibold: 600; /* @kind other */\n  --fw-bold: 700; /* @kind other */\n  --fw-extrabold: 800; /* @kind other */\n\n  /* Type scale — sizes */\n  --fs-display: 56px;\n  --fs-h1: 40px;\n  --fs-h2: 30px;\n  --fs-h3: 22px;\n  --fs-body-lg: 18px;\n  --fs-body: 16px;\n  --fs-small: 14px;\n  --fs-label: 12px;\n\n  /* Line heights & letter-spacing */\n  --lh-display: 1.04; /* @kind other */\n  --ls-display: -0.022em; /* @kind other */\n  --lh-h1: 1.1; /* @kind other */\n  --ls-h1: -0.015em; /* @kind other */\n  --lh-h2: 1.15; /* @kind other */\n  --ls-h2: -0.01em; /* @kind other */\n  --lh-h3: 1.25; /* @kind other */\n  --ls-h3: 0; /* @kind other */\n  --lh-body-lg: 1.6; /* @kind other */\n  --lh-body: 1.6; /* @kind other */\n  --lh-small: 1.5; /* @kind other */\n  --lh-label: 1.4; /* @kind other */\n  --ls-label: 0.14em; /* @kind other */\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   SPACING — Prefeitura de Rio Branco\n   Base-4 scale for predictable rhythm.\n   ============================================================ */\n\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n\n  /* Layout */\n  --container-comfortable: 1320px;\n  --container-compact: 1080px;\n  --gutter: 40px;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   EFFECTS — radii & shadows — Prefeitura de Rio Branco\n   Soft radii convey warmth without losing institutional formality.\n   Shadows are low and blue-tinted, never heavy.\n   ============================================================ */\n\n:root {\n  /* Corner radius */\n  --radius-sm: 7px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n\n  /* Shadows — blue-tinted, subtle */\n border-radius:10px;margin-bottom:22px\">\n            <button onclick=\"{{ ctx.tabLogin }}\" style=\"{{ ctx.tStyleLogin }}\">Entrar<\u002Fbutton>\n            <button onclick=\"{{ ctx.tabCad }}\" style=\"{{ ctx.tStyleCad }}\">Criar conta<\u002Fbutton>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ ctx.isCadastro }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <h2 style=\"font-family:var(--font-display);font-weight:600;font-size:21px;color:var(--azul-900);margin:0 0 4px;letter-spacing:-0.01em\">Cadastro de fornecedor<\u002Fh2>\n            <p style=\"margin:0 0 20px;font-size:14px;color:var(--cinza-500);line-height:1.5\">Informe o CNPJ da empresa. Os dados são validados na Receita Federal automaticamente.<\u002Fp>\n\n            <label style=\"font:600 12.5px var(--font-body);color:var(--cinza-700);margin-bottom:7px;display:block\">CNPJ da empresa<\u002Flabel>\n            <div style=\"position:relative;margin-bottom:4px\">\n              <input value=\"{{ ctx.cnpj }}\" onchange=\"{{ ctx.setCnpj }}\" placeholder=\"00.000.000/0000-00\" style=\"width:100%;padding:12px 14px;padding-right:108px;border:1px solid var(--border);border-radius:var(--radius-md);font:15px var(--font-body);color:var(--text-title);background:#fff;outline:none\" style-focus=\"border-color:var(--azul-600);box-shadow:0 0 0 3px var(--azul-100)\">\n              <sc-if value=\"{{ ctx.showConsultar }}\" hint-placeholder-val=\"{{ true }}\">\n              <button onclick=\"{{ ctx.consultar }}\" style=\"position:absolute;right:6px;top:6px;bottom:6px;padding:0 16px;border:none;border-radius:6px;background:var(--azul-700);color:#fff;font:600 13px var(--font-body);cursor:pointer\" style-hover=\"background:var(--azul-800)\">Consultar<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ ctx.showLoading }}\">\n            <div style=\"display:flex;align-items:center;gap:11px;margin-top:16px;padding:13px 15px;background:var(--azul-50 onta iniciará com o status <strong style=\"color:var(--azul-700)\">Requerente<\u002Fstrong>.<\u002Fp>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ ctx.showFallback }}\">\n            <div style=\"margin-top:16px;text-align:center\">\n              <button onclick=\"{{ ctx.manual }}\" style=\"background:none;border:none;cursor:pointer;font:500 13px var(--font-body);color:var(--azul-700);text-decoration:underline\">Receita Federal indisponível? Preencher manualmente<\u002Fbutton>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ ctx.isLogin }}\">\n          <div>\n            <h2 style=\"font-family:var(--font-display);font-weight:600;font-size:21px;color:var(--azul-900);margin:0 0 4px;letter-spacing:-0.01em\">Acessar plataforma<\u002Fh2>\n            <p style=\"margin:0 0 22px;font-size:14px;color:var(--cinza-500);line-height:1.5\">Entre com o e-mail e a senha cadastrados.<\u002Fp>\n            <label style=\"font:600 12.5px var(--font-body);color:var(--cinza-700);margin-bottom:7px;display:block\">E-mail<\u002Flabel>\n            <input value=\"{{ ctx.lEmail }}\" onchange=\"{{ ctx.setLEmail }}\" style=\"width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font:15px var(--font-body);background:#fff;outline:none;margin-bottom:16px\" style-focus=\"border-color:var(--azul-600);box-shadow:0 0 0 3px var(--azul-100)\">\n            <label style=\"font:600 12.5px var(--font-body);color:var(--cinza-700);margin-bottom:7px;display:block\">Senha<\u002Flabel>\n            <div style=\"position:relative;margin-bottom:16px\">\n              <input value=\"{{ ctx.lSenha }}\" onchange=\"{{ ctx.setLSenha }}\" type=\"{{ loginPassType }}\" placeholder=\"••••••••\" style=\"width:100%;padding:12px 44px 12px 14px;border:1px solid var(--border);border-radius:var(--radius-md);font:15px var(--font-body);background:#fff;outline:none\" st Box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--erro)\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg>PDF<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-xs);overflow:hidden\">\n            <div style=\"overflow-x:auto\">\n            <sc-for list=\"{{ mcHead }}\" as=\"h\" hint-placeholder-count=\"6\"><\u002Fsc-for><sc-for list=\"{{ mcRows }}\" as=\"c\" hint-placeholder-count=\"5\">\n                <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-family:var(--font-body)\">\n              <thead><tr style=\"background:#E2E7EE\"><th style=\"{{ h.thStyle }}\" onclick=\"{{ h.on }}\">{{ h.lb }}{{ h.arrow }}<\u002Fth><\u002Ftr><\u002Fthead>\n              <tbody>\n                <tr style=\"border-top:1px solid var(--divider)\" style-hover=\"background:var(--azul-50)\">\n                  <td style=\"padding:15px 16px;font:600 14px var(--font-body);color:var(--azul-700);white-space:nowrap\">{{ c.num }}<\u002Ftd>\n                  <td style=\"padding:15px 16px;font-size:14px;color:var(--text-title);min-width:220px\">{{ c.objeto }}<div style=\"font-size:11.5px;color:var(--cinza-400);margin-top:3px\">{{ c.sec }} · {{ c.stepText }}<\u002Fdiv><\u002Ftd>\n                  <td style=\"padding:15px 16px\"><span style=\"{{ c.pillStyle }}\"><span style=\"{{ c.dotStyle }}\"><\u002Fspan>{{ c.statusLb }}<\u002Fspan><\u002Ftd>\n                  <td style=\"padding:15px 16px;font-size:13px;color:var(--cinza-500);white-space:nowrap\">{{ c.createdFmt }}<\u002Ftd>\n                  <td style=\"padding:15px 16px;font-size:13px;color:var(--cinza-500);white-space:nowrap\">{{ c.updatedFmt }}<\u002Ftd>\n                  <td style=\"padding:15px 16px;text-align:right\"><div style=\"display:inline-flex;gap:8px;align-items:center;justify-content:flex-end\"><sc-if value=\"{{ c.canCancel }}\"><button onclick=\"{{ c.onCancel }}\" title=\"Cancelar\" style=\"width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--cinza-500);cursor:pointer;display:inline-flex;align-items:center;justify-content:center\" style-hover=\"background:var(--erro-bg);color:var(--erro-700);border-color:var(--erro)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg><\u002Fbutton><\u002Fsc-if><button onclick=\"{{ c.onOpen }}\" style=\"{{ c.actStyle }}\">{{ c.actLabel }}<svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton><\u002Fdiv><\u002Ftd>\n                <\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n            <\u002Fdiv>\n            <sc-if value=\"{{ mcEmpty }}\"><div style=\"padding:48px 24px;text-align:center;color:var(--cinza-500)\"><div style=\"font:600 15px var(--font-body);color:var(--azul-900);margin-bottom:4px\">Nenhum credenciamento neste filtro<\u002Fdiv><div style=\"font-size:13.5px\">Inicie um credenciamento na Vitrine de Editais.<\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 18px;border-top:1px solid var(--divider);flex-wrap:wrap\">\n              <span style=\"font-size:13px;color:var(--cinza-500)\">{{ mcInfo }}<\u002Fspan>\n              <div style=\"display:flex;gap:6px\"><sc-for list=\"{{ mcPager }}\" as=\"p\" hint-placeholder-count=\"2\"><button onclick=\"{{ p.on }}\" style=\"{{ p.style }}\">{{ p.n }}<\u002Fbutton><\u002Fsc-for><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isWizard }}\">\n        <div style=\"animation:cmfade .3s\">\n          <button onclick=\"{{ goMeusCred }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;font:600 13.5px var(--font-body);color:var(--cinza-500);margin-bottom:14px\" style-hover=\"color:var(--azul-700)\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"><\u002Fline><polyline points=\"12 19 5 12 12 5\"><\u002Fpolyline><\u002Fsvg>Voltar à vitrine<\u002Fbutton>\n          <div style=\"background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-xs);padding:20px 22px;margin-bottom:18px;display:flex;gap:14px;align-items:center;flex-wrap:wrap\">\n            <div style=\"width:46px;height:46px;border-radius:11px;background:var(--azul-50);color:var(--azul-700);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"23\" height=\"23\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n            <div style=\"flex:1;min-width:200px\"><div style=\"display:flex;align-items:center;gap:9px;flex-wrap:wrap\"><span style=\"font:600 15px var(--font-body);color:var(--azul-700)\">{{ wEdital.num }}<\u002Fspan><span style=\"font:600 10px var(--font-body);letter-spacing:.06em;color:var(--azul-800);background:var(--azul-100);padding:3px 9px;border-radius:6px\">{{ wEdital.sec }}<\u002Fspan><\u002Fdiv><div style=\"font:600 16px var(--font-body);color:var(--text-title);margin-top:5px\">{{ wEdital.objeto }}<\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;flex-wrap:wrap\"><div style=\"text-align:right;padding:8px 16px;border-left:1px solid var(--divider)\"><div style=\"font:600 10px var(--font-body);letter-spacing:.06em;text-transform:uppercase;color:var(--cinza-400)\">Demanda total do edital<\u002Fdiv><div style=\"font:600 20px var(--font-body);color:var(--azul-900);margin-top:3px\">12.000 <span style=\"font-size:13px;color:var(--cinza-400);font-weight:500\">conjuntos<\u002Fspan><\u002Fdiv><\u002Fdiv><div style=\"text-align:right;padding:8px 16px;border-left:1px solid var(--divider)\"><div style=\"font:600 10px var(--font-body);letter-spacing:.06em;text-transform:uppercase;color:var(--cinza-400)\">Encerra em<\u002Fdiv><div style=\"font:600 20px var(--font-body);color:var(--azul-900);margin-top:3px\">{{ wEdital.prazo }}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden\">\n            <div style=\"padding:24px 30px;border-bottom:1px solid var(--divider);display:flex;align-items:center;gap:4px\">\n              <sc-for list=\"{{ stepper }}\" as=\"s\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:10px;flex-shrink:0\"><div style=\"{{ s.circleStyle }}\"><sc-if value=\"{{ s.done }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fsc-if><sc-if value=\"{{ s.notdone }}\">{{ s.n }}<\u002Fsc-if><\u002Fdiv><div class=\"cm-hide-sm\" style=\"{{ s.labelStyle }}\">{{ s.lb }}<\u002Fdiv><\u002Fdiv>\n              <sc-if value=\"{{ s.showLine }}\"><div style=\"{{ s.lineStyle }}\"><\u002Fdiv><\u002Fsc-if>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"padding:36px 36px 30px\">\n\n              <sc-if value=\"{{ step1 }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"animation:cmfade .25s\"><div style=\"font:600 11px var(--font-body);letter-spacing:.1em;color:var(--azul-700);margin-bottom:6px\">PASSO 1<\u002Fdiv><h2 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;color:var(--azul-900);margin:0 0 22px\">Declaração de capacidade produtiva<\u002Fh2>\n                <div class=\"cm-grid-2\" style=\"display:grid;grid-template-columns:1.15fr 1fr;gap:30px;align-items:start\">\n                  <div>\n                    <p style=\"font-size:14.5px;color:var(--cinza-500);line-height:1.6;margin:0 0 20px\">Informe a quantidade máxima que sua empresa consegue entregar. O sistema usa esse número como <strong>teto<\u002Fstrong> no rateio matemático — você nunca recebe demanda acima da sua capacidade.<\u002Fp>\n                    <label style=\"font:600 12.5px var(--font-body);color:var(--cinza-700);margin-bottom:8px;display:block\">Capacidade máxima (conjuntos)<\u002Flabel>\n                    <input value=\"{{ cap }}\" onchange=\"{{ setCap }}\" type=\"number\" placeholder=\"Ex.: 4000\" style=\"width:100%;padding:14px 16px;border:1px solid var(--border);border-radius:10px;font:18px var(--font-body);background:#fff;outline:none\" style-focus=\"border-color:var(--azul-600);box-shadow:0 0 0 3px var(--azul-100)\">\n                    <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:12px;font-size:12.5px;color:var(--cinza-500);line-height:1.5\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--azul-600)\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink:0;margin-top:1px\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><line x1=\"12\" y1=\"16\" x2=\"12\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"8\" x2=\"12.01\" y2=\"8\"><\u002Fline><\u002Fsvg>Você pode declarar qualquer valor até a demanda total do edital. Empresas com capacidade menor concorrem normalmente no rateio.<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:var(--azul-50);border:1px solid var(--azul-100);border-radius:12px;padding:22px 24px\">\n                    <div style=\"font:600 11px var(--font-body);letter-spacing:.08em;text-transform:uppercase;color:var(--azul-700);margin-bottom:14px\">Como o teto é aplicado<\u002Fdiv>\n                    <div style=\"display:grid;gap:14px\">\n                      <div style=\"display:flex;gap:11px\"><div style=\"width:26px;height:26px;border-radius:50%;background:#fff;color:var(--azul-700);font:600 13px var(--font-body);display:flex;align-items:center;justify-content:center;flex-shrink:0\">1<\u002Fdiv><div style=\"font-size:13.5px;color:var(--azul-800);line-height:1.5\">Sua capacidade declarada vira o <strong>limite máximo<\u002Fstrong> de itens que podem ser alocados à sua empresa.<\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;gap:11px\"><div style=\"width:26px;height:26px;border-radius:50%;background:#fff;color:var(--azul-700);font:600 13px var(--font-body);display:flex;align-items:center;justify-content:center;flex-shrink:0\">2<\u002Fdiv><div style=\"font-size:13.5px;color:var(--azul-800);line-height:1.5\">A demanda do edital é dividida entre os fornecedores aptos, respeitando o teto de cada um.<\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;gap:11px\"><div style=\"width:26px;height:26px;border-radius:50%;background:#fff;color:var(--azul-700);font:600 13px var(--font-body);display:flex;align-items:center;justify-content:center;flex-shrink:0\">3<\u002Fdiv><div style=\"font-size:13.5px;color:var(--azul-800);line-height:1.5\">O saldo não atendido vai para o <strong>Cadastro de Reserva<\u002Fstrong>, acionado em uma 2ª demanda.<\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ step2 }}\">\n              <div style=\"animation:cmfade .25s\"><div style=\"font:600 11px var(--font-body);letter-spacing:.1em;color:var(--azul-700);margin-bottom:6px\">PASSO 2<\u002Fdiv><h2 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;color:var(--azul-900);margin:0 0 8px\">Documentos exigidos<\u002Fh2><p style=\"font-size:14.5px;color:var(--cinza-500);line-height:1.55;margin:0 0 22px\">Documentos válidos enviados em editais anteriores são <strong>reaproveitados automaticamente<\u002Fstrong>. Você só precisa anexar o que falta.<\u002Fp>\n                <div style=\"display:grid;gap:10px\"><sc-for list=\"{{ reqDocs }}\" as=\"d\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:13px;padding:14px 16px;border:1px solid var(--border);border-radius:11px;background:#fff\">\n                  <sc-if value=\"{{ d.reuse }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"width:34px;height:34px;border-radius:9px;background:var(--sucesso-bg);color:var(--sucesso);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><\u002Fsc-if>\n                  <sc-if value=\"{{ d.missing }}\"><div style=\"width:34px;height:34px;border-radius:9px;background:var(--atencao-bg);color:#8A5410;display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14\"><\u002Fpath><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg><\u002Fdiv><\u002Fsc-if>\n                  <div style=\"flex:1;font:600 14.5px var(--font-body);color:var(--text-title)\">{{ d.nome }}<\u002Fdiv>\n                  <sc-if value=\"{{ d.reuse }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font:600 12px var(--font-body);color:var(--sucesso)\">Importado de edital anterior<\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ d.missing }}\"><span style=\"font:600 12px var(--font-body);color:#8A5410\">Necessário enviar<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <\u002Fsc-for><\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ step3 }}\">\n              <div style=\"animation:cmfade .25s\"><div style=\"font:600 11px var(--font-body);letter-spacing:.1em;color:var(--azul-700);margin-bottom:6px\">PASSO 3<\u002Fdiv><h2 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;color:var(--azul-900);margin:0 0 8px\">Enviar documentos pendentes<\u002Fh2><p style=\"font-size:14.5px;color:var(--cinza-500);line-height:1.55;margin:0 0 22px\">Anexe apenas os PDFs ausentes ou as certidões expiradas.<\u002Fp>\n                <div style=\"display:grid;gap:14px\"><sc-for list=\"{{ missingDocs }}\" as=\"d\" hint-placeholder-count=\"2\">\n                <div><div style=\"font:600 13.5px var(--font-body);color:var(--text-title);margin-bottom:8px\">{{ d.nome }}<\u002Fdiv><div style=\"border:1.5px dashed var(--border-strong);border-radius:12px;padding:24px;text-align:center;background:var(--bg-page);cursor:pointer\" style-hover=\"border-color:var(--azul-600);background:var(--azul-50)\"><div style=\"width:42px;height:42px;border-radius:11px;background:#fff;color:var(--azul-700);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;box-shadow:var(--shadow-xs)\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"17 8 12 3 7 8\"><\u002Fpolyline><line x1=\"12\" y1=\"3\" x2=\"12\" y2=\"15\"><\u002Fline><\u002Fsvg><\u002Fdiv><div style=\"font:600 14px var(--font-body);color:var(--azul-800)\">Arraste o PDF aqui ou clique para selecionar<\u002Fdiv><div style=\"font-size:12.5px;color:var(--cinza-400);margin-top:3px\">PDF até 10 MB · será comprimido para o SEI<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fsc-for><\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ step4 }}\">\n              <div style=\"max-width:520px;margin:0 auto;text-align:center;animation:cmfade .25s\"><div style=\"font:600 11px var(--font-body);letter-spacing:.1em;color:var(--azul-700);margin-bottom:6px\">PASSO 4 · OPCIONAL<\u002Fdiv><h2 style=\"font-family:var(--font-display);font-weight:600;font-size:22px;color:var(--azul-900);margin:0 0 8px\">Autenticação facial do procurador<\u002Fh2><p style=\"font-size:14.5px;color:var(--cinza-500);line-height:1.55;margin:0 0 24px\">Prova de vida (liveness) para validar a assinatura, cruzando o rosto com o documento de identidade. Esta etapa é opcional.<\u002Fp>\n                <div style=\"width:170px;height:210px;margin:0 auto 22px;border-radius:18px;background:var(--azul-50);border:2px solid var(--azul-100);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden\">\n                  <sc-if value=\"{{ facialIdle }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"70\" height=\"70\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--azul-300)\" stroke-width=\"1.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2\"><\u002Fpath><circle cx=\"12\" cy=\"7\" r=\"4\"><\u002Fcircle><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ facialChecking }}\"><div style=\"position:absolute;inse d var(--divider);display:flex;justify-content:flex-end;align-items:center;background:var(--bg-page)\">\n              <div style=\"display:flex;gap:10px;align-items:center\">\n                <sc-if value=\"{{ showBack }}\"><button onclick=\"{{ wPrev }}\" style=\"display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border:1.5px solid var(--border);border-radius:9px;background:#fff;color:var(--cinza-700);font:600 14px var(--font-body);cursor:pointer\" style-hover=\"background:var(--azul-50)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"><\u002Fline><polyline points=\"12 19 5 12 12 5\"><\u002Fpolyline><\u002Fsvg>Voltar<\u002Fbutton><\u002Fsc-if>\n                <sc-if value=\"{{ hideBack }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ cancelWizard }}\" style=\"display:inline-flex;align-items:center;gap:8px;padding:11px 20px;border:1.5px solid var(--border);border-radius:9px;background:#fff;color:var(--cinza-700);font:600 14px var(--font-body);cursor:pointer\" style-hover=\"background:var(--azul-50)\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"><\u002Fline><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"><\u002Fline><\u002Fsvg>Cancelar<\u002Fbutton><\u002Fsc-if>\n                <sc-if value=\"{{ step4 }}\"><button onclick=\"{{ skipFacial }}\" style=\"padding:11px 18px;border:none;background:none;color:var(--cinza-500);font:600 14px var(--font-body);cursor:pointer;text-decoration:underline\">Pular esta etapa<\u002Fbutton><\u002Fsc-if>\n                <button onclick=\"{{ wNext }}\" style=\"display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border:none;border-radius:9px;background:var(--azul-700);color:#fff;font:600 14.5px var(--font-body);cursor:pointer\" style-hover=\"background:var(--azul-800)\">{{ nextLabel }}<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg><\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ isDocs }}\">\n        <div style=\"animation:cmfade .3s\">\n          <h1 style=\"font-weight:600;font-size:22px;color:var(--azul-900);margin:0\">Gestão de Documentos<\u002Fh1>\n          <p style=\"margin:6px 0 18px;font-size:14.5px;color:var(--cinza-500)\">Repositório central da sua empresa. Reaproveitado automaticamente em novos editais.<\u002Fp>\n          <div style=\"background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-xs);overflow:hidden\">\n            <div class=\"cm-hide-sm\" style=\"display:grid;grid-template-columns:2.4fr 1fr 1.1fr 1.3fr;gap:12px;padding:14px 22px;border-bottom:1px solid var(--divider);background:#E2E7EE;font:600 11px var(--font-body);letter-spacing:.08em;color:var(--azul-900)\"><div>DOCUMENTO<\u002Fdiv><div>VALIDADE<\u002Fdiv><div>STATUS<\u002Fdiv><div style=\"text-align:right\">AÇÕES<\u002Fdiv><\u002Fdiv>\n            <sc-for list=\"{{ docs }}\" as=\"d\" hint-placeholder-count=\"6\">\n            <div style=\"border-bottom:1px solid var(--divider);border-left:{{ d.accentBorder }}\">\n              <div class=\"cm-grid-2\" style=\"display:grid;grid-template-columns:2.4fr 1fr 1.1fr 1.3fr;gap:12px;padding:16px 22px;align-items:center\">\n                <div style=\"display:flex;align-items:center;gap:12px;min-width:0\"><div style=\"width:36px;height:36px;border-radius:9px;background:var(--azul-50);color:var(--azul-700);display:flex;align-items:center;justify-content:center;flex-shrink:0\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"><\u002Fpath><polyline points=\"14 2 14 8 20 8\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv><span style=\"font:600 14.5px var(--font-body);color:var(--text-title)\">{{ d.nome }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:14px;color:var(--cinza-500)\">{{ d.val }}<\u002Fdiv>\n                <div><span style=\"{{ d.pillStyle }}\">{{ d.label }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;gap:8px;justify-content:flex-end\">\n                  <button onclick=\"{{ d.onView }}\" title=\"Visualizar\" style=\"width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--cinza-700)\" style-hover=\"background:var(--azul-50)\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fbutton>\n                  <button title=\"Baixar\" style=\"width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--cinza-700)\" style-hover=\"background:var(--azul-50)\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><polyline points=\"7 10 12 15 17 10\"><\u002Fpolyline><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"><\u002Fline><\u002Fsvg><\u002F ecedores aptos e sempre limitado à sua capacidade declarada (teto).<\u002Fp>\n          <div style=\"display:grid;gap:16px\">\n            <sc-for list=\"{{ demandas }}\" as=\"m\" hint-placeholder-count=\"2\">\n            <div style=\"background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-xs);overflow:hidden\">\n              <div style=\"display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--divider);flex-wrap:wrap\">\n                <span style=\"font:600 14px var(--font-body);color:var(--azul-700)\">{{ m.num }}<\u002Fspan>\n                <span style=\"font:600 10px var(--font-body);letter-spacing:.06em;color:var(--azul-800);background:var(--azul-100);padding:3px 9px;border-radius:6px\">{{ m.sec }}<\u002Fspan>\n                <span style=\"font-size:14px;color:var(--text-title);flex:1;min-width:160px\">{{ m.objeto }}<\u002Fspan>\n                <span style=\"{{ m.pill }};font:600 11.5px var(--font-body);padding:5px 12px;border-radius:999px;white-space:nowrap\">{{ m.situacao }}<\u002Fspan>\n              <\u002Fdiv>\n\n              <sc-if value=\"{{ m.isTitular }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"padding:20px 22px\">\n                <div style=\"font:600 10.5px var(--font-body);letter-spacing:.12em;color:var(--cinza-400);margin-bottom:14px\">RATEIO MATEMÁTICO DESTA DEMANDA<\u002Fdiv>\n                <div class=\"cm-grid-4\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n                  <div style=\"background:var(--bg-page);border-radius:11px;padding:14px 16px\"><div style=\"font-size:12px;color:var(--cinza-500)\">Demanda total<\u002Fdiv><div style=\"font:600 22px var(--font-body);color:var(--azul-900);margin-top:3px\">{{ m.total }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"background:var(--bg-page);border-radius:11px;padding:14px 16px\"><div style=\"font-size:12px;color:var(--cinza-500)\">Fornecedores aptos<\u002Fdiv>
